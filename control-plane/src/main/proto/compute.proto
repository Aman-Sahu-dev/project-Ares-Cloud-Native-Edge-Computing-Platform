syntax = "proto3";
package compute;

option java_package = "com.ares.compute";
option java_outer_classname = "ComputeProto";

service ExecutionEngine{
  rpc ExecuteTask (TaskRequest) returns (TaskResponse);
  rpc StreamHeartBeat (NodeStatus) returns (Empty);
}
message TaskRequest{
  string task_id = 1;
  string runtime = 2;
  string entry_point = 3;
  bytes byte_code = 4;
  int64 memory_limit_bytes = 5;
  int32 cpu_shares = 6;
}
message TaskResponse{
  string task_id = 1;
  bytes stdout_output = 2;
  bytes stderr_output = 3;
  int64 execution_time = 4;
  string exit_code = 5;
}
message NodeStatus {
  string node_id = 1;
  double total_cpu_usage = 2;
  int64 available_ram_bytes = 3;
}
message Empty{}