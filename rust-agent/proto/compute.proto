syntax = "proto3";
package compute;

service ExecutionEngine {
  rpc ExecuteTask (TaskRequest) returns (TaskResponse);
  rpc StreamHeartbeat (NodeStatus) returns (Empty);
}

message TaskRequest {
  string task_id = 1;
  bytes byte_code = 2;
  int64 memory_limit_bytes = 3;
  int32 cpu_shares = 4;
}

message TaskResponse {
  string task_id = 1;
  bytes stdout_output = 2;
  int64 execution_time_ns = 3;
  string exit_code = 4;
}

message NodeStatus {
  string node_id = 1;
  double total_cpu_usage = 2;
  int64 available_ram_bytes = 3;
}

message Empty {}
